<h1 style="text-align: center; color: #A63A50" >Registration</h1>
    <div class="container mt-5">
        <form class="box-bg">
            <h3 style="color: #BA6E6E">Register</h3><br>
                <div class="row mb-3">
                    <div class="col">
                        <h4>First Name</h4>
                            <input type="text" class="form-control form-control-sm" placeholder="First">
                    </div>
                    <div class="col">
                        <h4>Last Name</h4>
                            <input type="text" class="form-control form-control-sm" placeholder="Last">
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col">
                        <h4>Age</h4>
                            <input type="text" class="form-control form-control-sm" placeholder="Age">
                    </div>
                    <div class="col">
                        <h4>Gender</h4>
                            <select class="form-select">
                                <option>Male</option>
                                <option>Female</option>
                            </select>
                    </div>
                </div>
                <h3 style="color: #BA6E6E">Contact Details</h3><br>
                    <h4>Email Address</h4>
                    <input type="text" placeholder="student@example.com"><br>
            <br>
                    <h4>Contact Number</h4>
                    <input type="number" placeholder="0913-6184-0967"><br>
                <br>
                 <div class="row mb-3">
                    <div class="col">
                        <h4>Enter your username</h4>
                            <input type="text" class="form-control form-control-sm" placeholder="Username">
                    </div>
                    <div class="col">
                        <h4>Enter your password</h4>
                            <input type="text" class="form-control form-control-sm" placeholder="Password"><br>
                        </div>
                        <label>
                        <input type="checkbox" name="terms" required>
                    I accept <a href="/terms" target="_blank">Terms of Use</a> and <a href="/privacy" target="_blank">Privacy Policy</a></label><br>
                    <br>
                <a href="page3.html">
    <button type="button" class="btn btn-primary">Create my Account</button>
                </a>
      <div>
         <button type="submit" class="btn btn-light btn-sm">Cancel</button>
      </div>
        </form>
